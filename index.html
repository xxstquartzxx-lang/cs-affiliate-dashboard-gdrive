<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アフィリエイト分析（Google Drive連携）</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#1E3A5F;--a:#10B981;--al:#D1FAE5;--pl:#DBEAFE;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;--w:#FFF;--sh:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04)}
body{font-family:'Noto Sans JP','Helvetica Neue',Arial,sans-serif;background:var(--g50);color:var(--g900);line-height:1.5}
.card{background:var(--w);border-radius:10px;box-shadow:var(--sh);overflow:hidden;border-top:3px solid var(--p)}.card--a{border-top-color:var(--a)}.card--g{border-top-color:var(--g300)}.card--w{border-top-color:#F59E0B}
.shd{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;flex-wrap:wrap;gap:8px}
.sb{width:4px;height:20px;border-radius:2px;background:var(--p);flex-shrink:0}.sb--a{background:var(--a)}.sb--w{background:#F59E0B}
.st{font-size:15px;font-weight:700;color:var(--g900);margin-left:10px}
.sbd{padding:0 22px 20px}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.kpi{padding:18px 22px}.kl{font-size:11px;color:var(--g500);font-weight:600;letter-spacing:.4px;margin-bottom:6px}.kv{font-size:24px;font-weight:800;color:var(--g900);letter-spacing:-.5px;line-height:1.1}.ks{font-size:11px;color:var(--g400);margin-top:6px}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin-bottom:20px}
.tbtn{padding:10px 22px;border:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--g500);background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:inherit}.tbtn.on{font-weight:700;color:var(--p);border-bottom-color:var(--p)}
.dt{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:12px}.dt th{color:var(--g500);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;font-weight:600;position:sticky;top:0;background:var(--w);z-index:1;white-space:nowrap}.dt td{padding:8px}.dt tr.hl{background:rgba(30,58,95,.03)}.dt .tr{background:var(--g50);font-weight:700}
.ar{text-align:right}.al{text-align:left}.fb{font-weight:700}.cp{color:var(--p)}
.bdg{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff;font-size:10px;font-weight:700}.bg{background:#F59E0B}.bs{background:#94A3B8}.bb{background:#CD7F32}.bn{font-size:11px;color:var(--g400);font-weight:600;width:26px;text-align:center;display:inline-block}
.dz{flex:1;min-width:240px;min-height:80px;border:2px dashed var(--g300);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:border-color .2s,background .2s;background:var(--g50);padding:16px}.dz.ov{border-color:var(--a);background:var(--al)}
.eb{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;background:var(--g100);color:var(--g500);font-family:inherit}.eb.on{font-weight:700;background:var(--p);color:var(--w)}
.ft{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;background:var(--al);color:var(--a);border:1px solid rgba(16,185,129,.13)}
#tip{position:fixed;pointer-events:none;z-index:9999;background:rgba(17,24,39,.92);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.6;white-space:nowrap;opacity:0;transition:opacity .12s}
.pt{height:5px;background:var(--g100);border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .5s ease}
.ins{padding:14px 16px;border-radius:8px;background:var(--g50);border-left:3px solid var(--p);margin-bottom:10px}.ins:last-child{margin-bottom:0}
.ct{max-width:1100px;margin:0 auto;padding:24px 16px 48px}
.hd{display:none}
.sel{padding:5px 10px;border-radius:6px;border:1px solid var(--g200);font-size:11px;color:var(--g700);background:var(--w);cursor:pointer;min-width:200px;max-width:100%;font-family:inherit}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ib{background:var(--pl);border-radius:8px;padding:10px 16px;border:1px solid rgba(30,58,95,.13);font-size:12px;color:var(--g700);line-height:1.6}.ib strong{color:var(--p)}
.fh{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}
.uc{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 20px}
.ab{padding:4px 12px;border-radius:6px;border:1px dashed var(--g300);background:var(--w);color:var(--g500);font-size:11px;cursor:pointer;font-weight:600;font-family:inherit}
.es{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:10px;background:var(--g100);color:var(--g500);font-family:inherit}.es.on{font-weight:700;background:var(--p);color:var(--w)}
.rb{padding:6px 14px;border-radius:6px;border:1px solid var(--g200);background:var(--w);color:var(--g500);font-size:11px;cursor:pointer;font-weight:600;font-family:inherit}
.stag{display:inline-block;padding:5px 18px 5px 14px;font-size:13px;font-weight:700;color:var(--w);background:var(--p);clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%);margin-bottom:14px;letter-spacing:.3px}
.tc{padding:14px 16px;border-radius:8px;background:var(--g50);border-left:3px solid var(--p)}.tv{font-size:22px;font-weight:800}.tl{font-size:11px;color:var(--g500);margin-top:2px}
.up{font-size:11px;color:var(--a)}.dn{font-size:11px;color:#EF4444}
.cg{margin-top:16px;padding:12px 16px;background:var(--g50);border-radius:8px;border:1px solid var(--g200)}
.gd-btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;color:var(--w);background:var(--p);font-family:inherit;transition:background .2s}.gd-btn:hover{background:#2D5F8A}.gd-btn:disabled{opacity:.5;cursor:wait}
.gd-btn--sm{font-size:12px;padding:8px 16px}
.warn-box{background:#FEF2F2;border-radius:8px;padding:10px 16px;border:1px solid #FCA5A5;font-size:12px;color:#991B1B;line-height:1.6;margin-bottom:12px}
.warn-box strong{color:#DC2626}
.ok-box{background:var(--al);border-radius:8px;padding:10px 16px;border:1px solid rgba(16,185,129,.2);font-size:12px;color:#065F46;line-height:1.6;margin-bottom:12px}
.progress-bar{width:100%;height:4px;background:var(--g200);border-radius:2px;margin:12px 0;overflow:hidden}
.progress-fill2{height:100%;background:var(--p);border-radius:2px;transition:width .3s}
.folder-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.folder-card{padding:14px 20px;border-radius:10px;background:var(--g50);border:2px solid var(--g200);cursor:pointer;transition:all .2s;min-width:140px;text-align:center}
.folder-card:hover{border-color:var(--p);background:var(--pl)}
.folder-card.active{border-color:var(--p);background:var(--pl)}
.folder-card .fc-icon{font-size:24px;margin-bottom:4px}
.folder-card .fc-name{font-size:13px;font-weight:700;color:var(--g900)}
.folder-card .fc-sub{font-size:10px;color:var(--g400);margin-top:2px}
.step-indicator{display:flex;gap:8px;align-items:center;margin-bottom:16px;font-size:12px;color:var(--g400)}
.step-indicator .step{padding:4px 12px;border-radius:12px;background:var(--g100);font-weight:600}
.step-indicator .step.on{background:var(--p);color:var(--w)}
.step-indicator .step.done{background:var(--a);color:var(--w)}
</style>
</head>
<body>
<div id="tip"></div>
<div class="ct">
  <div class="card" style="margin-bottom:20px"><div style="padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div style="display:flex;align-items:center;gap:14px"><div style="width:4px;height:24px;border-radius:2px;background:var(--p);flex-shrink:0"></div><h1 style="font-size:18px;font-weight:800;letter-spacing:-.3px">アフィリエイト分析</h1><span style="font-size:11px;padding:3px 10px;border-radius:12px;background:var(--al);color:var(--a);font-weight:600">Google Drive連携</span></div><button class="rb hd" id="rst" onclick="reset()">リセット</button></div></div>
  <!-- Drive Panel -->
  <div class="card card--a" style="margin-bottom:20px" id="drivePanel">
    <div id="loginView" style="padding:24px;text-align:center">
      <div style="font-size:28px;margin-bottom:8px">📁</div>
      <div style="font-size:14px;font-weight:700;color:var(--g900);margin-bottom:4px">Googleドライブから自動読み込み</div>
      <div style="font-size:12px;color:var(--g400);margin-bottom:16px;line-height:1.6">店舗フォルダ → アフィリエイトフォルダを選択<br>CSVを自動判別・欠損チェックします</div>
      <button class="gd-btn" id="loginBtn" onclick="handleLogin()">Googleアカウントでログイン</button>
      <div style="font-size:11px;color:var(--g400);margin-top:8px" id="loginStatus"></div>
    </div>
    <div id="folderView" class="hd" style="padding:24px">
      <div class="step-indicator" id="steps"></div>
      <div id="folderContent"></div>
    </div>
    <div id="loadingView" class="hd" style="padding:24px">
      <div style="font-size:14px;font-weight:700;color:var(--g900);margin-bottom:8px" id="loadMsg">読み込み中...</div>
      <div class="progress-bar"><div class="progress-fill2" id="loadProg" style="width:0%"></div></div>
      <div style="font-size:11px;color:var(--g400)" id="loadDetail"></div>
    </div>
    <div id="resultView" class="hd" style="padding:20px 24px">
      <div id="checkResults"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="gd-btn gd-btn--sm" onclick="loadCSVsFromFolder(GD.selectedFolder)">🔄 再読み込み</button>
        <button class="gd-btn gd-btn--sm" style="background:var(--g500)" onclick="showFolders()">フォルダ選択に戻る</button>
        <button class="rb" onclick="reset()">リセット</button>
      </div>
    </div>
  </div>
  <div class="card card--g" id="empty" style="padding:40px 24px;text-align:center"><div style="font-size:36px;margin-bottom:10px;filter:grayscale(.7)">📊</div><div style="font-size:14px;font-weight:600;color:var(--g700);margin-bottom:4px">Googleドライブにログインしてください</div><div style="font-size:12px;color:var(--g400)">店舗フォルダ → アフィリエイトフォルダのCSVを自動で読み込みます</div></div>
  <div id="dash" class="hd"><div class="tabs" id="tBar"></div><div id="tC"></div></div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ═══ Config ═══
var CLIENT_ID='324002939529-d3djh51g7hqocu6i918669rootn59ao8.apps.googleusercontent.com';
var SCOPES='https://www.googleapis.com/auth/drive.readonly';
var $=function(id){return document.getElementById(id)};
var S={orders:[],pm:{},billing:[],fn:[],tab:'overview',sp:'all',sm:'all',dp:'all',spt:'all',sptM:'latest',A:null,token:null};
var CL=['#1E3A5F','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#F97316','#6366F1','#14B8A6','#A855F7'];
var TB=[{k:'overview',l:'概要'},{k:'products',l:'商品分析'},{k:'partners',l:'パートナー'}];
var GD={rootFolders:[],storeFolders:[],selectedStore:null,selectedFolder:null};

// ═══ Google Auth ═══
var tokenClient;
function initGIS(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:onToken})}
function handleLogin(){if(!tokenClient){try{initGIS()}catch(e){$('loginStatus').textContent='認証ライブラリの読み込みに失敗。ページを再読み込みしてください。';return}}$('loginBtn').disabled=true;$('loginStatus').textContent='ログイン中...';tokenClient.requestAccessToken()}
function onToken(r){if(r.error){$('loginStatus').innerHTML='<span style="color:#DC2626">ログインエラー: '+r.error+'</span>';$('loginBtn').disabled=false;return}S.token=r.access_token;showFolders()}

// ═══ Drive API ═══
function driveGet(url){return fetch(url,{headers:{'Authorization':'Bearer '+S.token}}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})}
function driveText(fid){return fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers:{'Authorization':'Bearer '+S.token}}).then(function(r){return r.text()})}
function driveList(q){return driveGet('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name,mimeType)&pageSize=200')}

// ═══ Folder Browser ═══
function showView(v){['loginView','folderView','loadingView','resultView'].forEach(function(id){$(id).classList.toggle('hd',id!==v)})}

async function showFolders(){
  showView('folderView');
  var fc=$('folderContent');fc.innerHTML='<div style="color:var(--g400);font-size:12px">フォルダを検索中...</div>';
  updateSteps(1);
  try{
    // ルートフォルダ一覧（マイドライブ直下のフォルダ）
    var res=await driveList("'root' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    GD.rootFolders=res.files||[];
    if(!GD.rootFolders.length){fc.innerHTML='<div class="warn-box">マイドライブにフォルダがありません</div>';return}
    showStoreSelect();
  }catch(e){fc.innerHTML='<div class="warn-box">フォルダの取得に失敗: '+e.message+'</div>'}
}

function showStoreSelect(){
  updateSteps(1);
  var fc=$('folderContent');fc.innerHTML='';
  var title=document.createElement('div');title.style.cssText='font-size:14px;font-weight:700;color:var(--g900);margin-bottom:12px';title.textContent='① 店舗フォルダを選択';fc.appendChild(title);
  var list=document.createElement('div');list.className='folder-list';
  GD.rootFolders.forEach(function(f){
    var card=document.createElement('div');card.className='folder-card';
    card.innerHTML='<div class="fc-icon">📁</div><div class="fc-name">'+f.name+'</div>';
    card.onclick=function(){GD.selectedStore=f;showSubFolders(f)};
    list.appendChild(card);
  });
  fc.appendChild(list);
}

async function showSubFolders(store){
  updateSteps(2);
  var fc=$('folderContent');fc.innerHTML='<div style="color:var(--g400);font-size:12px">'+store.name+' のサブフォルダを検索中...</div>';
  try{
    var res=await driveList("'"+store.id+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    GD.storeFolders=res.files||[];
    fc.innerHTML='';
    var title=document.createElement('div');title.style.cssText='font-size:14px;font-weight:700;color:var(--g900);margin-bottom:4px';title.textContent='② 分析フォルダを選択';fc.appendChild(title);
    var sub=document.createElement('div');sub.style.cssText='font-size:12px;color:var(--g400);margin-bottom:12px';sub.textContent=store.name+' > ...';fc.appendChild(sub);
    var back=document.createElement('button');back.className='rb';back.style.marginBottom='12px';back.textContent='← 店舗選択に戻る';back.onclick=showStoreSelect;fc.appendChild(back);
    if(!GD.storeFolders.length){fc.innerHTML+='<div class="warn-box">「'+store.name+'」にサブフォルダがありません</div>';return}
    var list=document.createElement('div');list.className='folder-list';
    GD.storeFolders.forEach(function(f){
      var isAff=f.name.includes('アフィリ');
      var card=document.createElement('div');card.className='folder-card'+(isAff?' active':'');
      card.innerHTML='<div class="fc-icon">'+(isAff?'📊':'📁')+'</div><div class="fc-name">'+f.name+'</div>'+(isAff?'<div class="fc-sub">← 推奨</div>':'');
      card.onclick=function(){GD.selectedFolder=f;loadCSVsFromFolder(f)};
      list.appendChild(card);
    });
    fc.appendChild(list);
  }catch(e){fc.innerHTML='<div class="warn-box">サブフォルダの取得に失敗: '+e.message+'</div>'}
}

function updateSteps(n){
  var st=$('steps');st.innerHTML='';
  [{l:'ログイン',n:0},{l:'店舗選択',n:1},{l:'フォルダ選択',n:2},{l:'読み込み',n:3}].forEach(function(s){
    var sp=document.createElement('span');sp.className='step'+(s.n<n?' done':(s.n===n?' on':''));sp.textContent=s.l;st.appendChild(sp);
    if(s.n<3){var ar=document.createElement('span');ar.textContent='→';st.appendChild(ar)}
  });
}

// ═══ Load CSVs from selected folder ═══
async function loadCSVsFromFolder(folder){
  showView('loadingView');updateSteps(3);
  $('loadMsg').textContent=GD.selectedStore.name+' / '+folder.name+' を読み込み中...';
  $('loadProg').style.width='5%';$('loadDetail').textContent='CSVファイルを検索中...';
  try{
    // 直下のCSVを検索
    var res=await driveList("'"+folder.id+"' in parents and (mimeType='text/csv' or name contains '.csv') and trashed=false");
    var files=(res.files||[]).map(function(f){f.sub='';return f});

    // サブフォルダも検索
    $('loadDetail').textContent='サブフォルダを検索中...';
    var subRes=await driveList("'"+folder.id+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    var subs=subRes.files||[];
    for(var si=0;si<subs.length;si++){
      $('loadProg').style.width=Math.round(5+si/Math.max(subs.length,1)*10)+'%';
      $('loadDetail').textContent='サブフォルダ検索中... '+subs[si].name;
      var subCsv=await driveList("'"+subs[si].id+"' in parents and (mimeType='text/csv' or name contains '.csv') and trashed=false");
      (subCsv.files||[]).forEach(function(f){f.sub=subs[si].name;files.push(f)});
    }

    if(!files.length){$('loadDetail').textContent='CSVファイルが見つかりません';setTimeout(function(){showView('folderView');showSubFolders(GD.selectedStore)},2000);return}

    S.orders=[];S.pm={};S.billing=[];S.fn=[];
    var report={fixed:{},partner:{},billing:{},errors:[],warnings:[]};

    for(var i=0;i<files.length;i++){
      var f=files[i];
      var pct=20+Math.round(i/files.length*70);
      $('loadProg').style.width=pct+'%';$('loadDetail').textContent='読み込み中 ('+(i+1)+'/'+files.length+') '+(f.sub?f.sub+'/':'')+f.name;
      try{
        var text=await driveText(f.id);
        var rows=pCSV(text);
        var info=idT(rows);
        if(info.t==='fixed'||info.t==='orders'){
          var nw=exO(rows,info.h);if(nw.length){var ym=nw[0].ym;S.orders=dedup(S.orders.concat(nw));report.fixed[ym]={fn:(f.sub?f.sub+'/':'')+f.name,cnt:nw.length};S.fn.push((f.sub?f.sub+'/':'')+f.name+' ('+info.t+' '+ym+')')}
        }else if(info.t==='partner'){
          var nw2=exP(rows,info.h);if(!S.pm[info.ym])S.pm[info.ym]=[];var seen=new Set(S.pm[info.ym].map(function(p){return p.id}));S.pm[info.ym]=S.pm[info.ym].concat(nw2.filter(function(p){return!seen.has(p.id)}));report.partner[info.ym]={fn:(f.sub?f.sub+'/':'')+f.name,cnt:nw2.length};S.fn.push((f.sub?f.sub+'/':'')+f.name+' (partner '+info.ym+')')
        }else if(info.t==='billing'){
          var nw3=exB(rows,info.h);var seen2=new Set(S.billing.map(function(b){return b.ym}));S.billing=S.billing.concat(nw3.filter(function(b){return!seen2.has(b.ym)}));report.billing[(f.sub?f.sub+'/':'')+f.name]={months:nw3.map(function(b){return b.ym})};S.fn.push((f.sub?f.sub+'/':'')+f.name+' (billing)')
        }else{report.errors.push((f.sub?f.sub+'/':'')+f.name+' → 種類を判別できません')}
      }catch(e){report.errors.push((f.sub?f.sub+'/':'')+f.name+' → '+e.message)}
    }

    $('loadProg').style.width='95%';$('loadDetail').textContent='整合性チェック中...';

    // Coverage check（成果確定は2ヶ月ズレのため直近2ヶ月を除外）
    var fYMs=Object.keys(report.fixed).sort(),pYMs2=Object.keys(report.partner).sort();
    var allYMs=new Set();fYMs.forEach(function(y){allYMs.add(y)});pYMs2.forEach(function(y){allYMs.add(y)});
    allYMs=Array.from(allYMs).sort();
    report.pendingFixed=[];
    if(allYMs.length>=2){
      var cur=new Date(allYMs[0]+'-01'),end=new Date(allYMs[allYMs.length-1]+'-01');
      // 直近2ヶ月の境界を計算
      var now=new Date();var cutoff=new Date(now.getFullYear(),now.getMonth()-1,1); // 2ヶ月前の月初
      while(cur<=end){
        var ym=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0');
        if(!report.fixed[ym]){
          if(cur>=cutoff){report.pendingFixed.push(ym)} // 直近2ヶ月は未確定扱い
          else{report.warnings.push('成果確定: '+ym+' のデータがありません')}
        }
        if(!report.partner[ym])report.warnings.push('パートナーRP: '+ym+' のデータがありません');
        cur.setMonth(cur.getMonth()+1);
      }
    }

// ═══ Analysis ═══
function analyze(){
  var O=S.orders,pm=S.pm,bl=S.billing;
  if(!O.length&&!Object.keys(pm).length&&!bl.length){S.A=null;return}
  var ds=new Set(),yms=new Set();
  O.forEach(function(o){ds.add(o.d);yms.add(o.ym)});
  var allD=Array.from(ds).sort(),allYM=Array.from(yms).sort();

  var dm={};O.forEach(function(o){if(!dm[o.d])dm[o.d]={d:o.d,a:0,c:0};dm[o.d].a+=o.a;dm[o.d].c++});
  var daily=allD.map(function(d){return dm[d]||{d:d,a:0,c:0}});

  var prm={};O.forEach(function(o){if(!prm[o.iid])prm[o.iid]={id:o.iid,nm:'',a:0,c:0,rw:0};prm[o.iid].a+=o.a;prm[o.iid].c++;prm[o.iid].rw+=o.rw});
  var lb=bL(O);Object.values(prm).forEach(function(p){p.nm=lb[p.id]||p.id});
  var prods=Object.values(prm).sort(function(a,b){return b.a-a.a});

  var pdm={};O.forEach(function(o){var k=o.iid+'|'+o.d;if(!pdm[k])pdm[k]={iid:o.iid,d:o.d,a:0,c:0};pdm[k].a+=o.a;pdm[k].c++});
  var pDaily=Object.values(pdm);

  // Product x Month
  var pmm={};O.forEach(function(o){var k=o.iid+'|'+o.ym;if(!pmm[k])pmm[k]=0;pmm[k]+=o.a});

  // Order monthly
  var omm={};O.forEach(function(o){if(!omm[o.ym])omm[o.ym]={a:0,c:0,rw:0};omm[o.ym].a+=o.a;omm[o.ym].c++;omm[o.ym].rw+=o.rw});

  // Partner months
  var pYMs=Object.keys(pm).sort();
  var pMon=pYMs.map(function(ym){var ps=pm[ym];return{ym:ym,cl:ps.reduce(function(s,p){return s+p.cl},0),sl:ps.reduce(function(s,p){return s+p.sl},0),a:ps.reduce(function(s,p){return s+p.a},0),rw:ps.reduce(function(s,p){return s+p.rw},0),act:ps.filter(function(p){return p.sl>0}).length,tot:ps.length}});

  // All YMs union
  var aYM=new Set(allYM);pYMs.forEach(function(y){aYM.add(y)});bl.forEach(function(b){aYM.add(b.ym)});
  aYM=Array.from(aYM).sort();

  // Billing map for YoY fallback
  var blMap={};bl.forEach(function(b){blMap[b.ym]=b});

  // Monthly summary
  var monthly=aYM.map(function(ym){
    var p=pMon.find(function(x){return x.ym===ym}),o=omm[ym],b=blMap[ym];
    return{ym:ym,a:p?p.a:(o?o.a:(b?b.a:0)),sl:p?p.sl:(o?o.c:(b?b.sl:0)),cl:p?p.cl:0,rw:p?p.rw:(o?o.rw:(b?b.rw:0)),act:p?p.act:0,tot:p?p.tot:0,bA:b?b.a:null,hP:!!p,hO:!!o,hB:!!b};
  });

  // Monthly map for easy lookup
  var mMap={};monthly.forEach(function(m){mMap[m.ym]=m});

  // Merged partners (all months including 2024)
  var ap={};pYMs.forEach(function(ym){pm[ym].forEach(function(p){if(!ap[p.id])ap[p.id]={id:p.id,ta:0,ts:0,tc:0,tr:0,m:{}};ap[p.id].ta+=p.a;ap[p.id].ts+=p.sl;ap[p.id].tc+=p.cl;ap[p.id].tr+=p.rw;ap[p.id].m[ym]=p})});
  var pList=Object.values(ap).filter(function(p){return p.ts>0}).sort(function(a,b){return b.ta-a.ta});

  var tA=O.reduce(function(s,o){return s+o.a},0);
  var tO=O.length;
  var uO=new Set(O.map(function(o){return o.oid})).size;
  var tC=pMon.reduce(function(s,p){return s+p.cl},0);

  S.A={allD:allD,allYM:allYM,aYM:aYM,daily:daily,prods:prods,pDaily:pDaily,pmm:pmm,omm:omm,monthly:monthly,mMap:mMap,blMap:blMap,pMon:pMon,pList:pList,pYMs:pYMs,tA:tA,tO:tO,uO:uO,tC:tC,lb:lb};
}

    ht.addEventListener('mouseenter',(function(bar,dd,xc,bh2){return function(){bar.setAttribute('fill','url(#mbh'+id+')');valText.textContent=fmt(dd.a);valText.setAttribute('x',xc);valText.setAttribute('y',ih-bh2-6);valText.style.opacity='1'}})(rc,d,x+bw/2,bh));
    ht.addEventListener('mouseleave',(function(bar){return function(){bar.setAttribute('fill','url(#mb'+id+')');valText.style.opacity='0'}})(rc));
    ht.addEventListener('mousemove',(function(dd){return function(e){var tip='<b>'+dd.ym+'</b><br>売上: '+fmt(dd.a);if(dd.mom!==null&&dd.mom!==undefined)tip+='<br>MoM: '+(dd.mom>=0?'+':'')+dd.mom+'%';if(dd.yoy!==null&&dd.yoy!==undefined)tip+='<br>YoY: '+(dd.yoy>=0?'+':'')+dd.yoy+'%';sT(e,tip)}})(d));
    ht.addEventListener('mouseleave',function(){hT()});
    g.appendChild(ht);
  });
  // MoM折れ線（opts.momLine=true の場合）
  if(opts.momLine&&data.length>=2){
    var momPts=[];
    for(var i=0;i<data.length;i++){
      if(data[i].mom!==null&&data[i].mom!==undefined){
        momPts.push({x:i*gap+gap/2,v:data[i].mom,i:i});
      }
    }
    if(momPts.length>=2){
      var momMax=Math.max.apply(null,momPts.map(function(p){return Math.abs(p.v)}))||1;
      var momScale=ih*0.3/momMax;
      var momBase=ih*0.5;
      var momPath=momPts.map(function(p,j){var y=momBase-p.v*momScale;return(j===0?'M':'L')+p.x+','+y}).join(' ');
      var ml=document.createElementNS(ns,'path');ml.setAttribute('d',momPath);ml.setAttribute('fill','none');ml.setAttribute('stroke','#EF4444');ml.setAttribute('stroke-width','2');ml.setAttribute('stroke-dasharray','6,3');ml.setAttribute('opacity','0.7');g.appendChild(ml);
      momPts.forEach(function(p){var y=momBase-p.v*momScale;var c=document.createElementNS(ns,'circle');c.setAttribute('cx',p.x);c.setAttribute('cy',y);c.setAttribute('r','3');c.setAttribute('fill','#EF4444');c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','1');g.appendChild(c)});
      // 凡例
      var leg=document.createElementNS(ns,'g');leg.setAttribute('transform','translate('+(iw+8)+','+(ih*0.5-10)+')');
      leg.innerHTML='<line x1="0" y1="0" x2="16" y2="0" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,2"/><text x="20" y="4" font-size="9" fill="#EF4444">MoM%</text>';
      g.appendChild(leg);
    }
  }
  svg.appendChild(g);ct.innerHTML='';ct.appendChild(svg);
}

// パートナー月次推移（選択パートナー or 全体）— グラフ + MoM/YoY表示のみ
function rPtMon(){
  var A=S.A;if(!A)return;
  var ct=$('ptMonC');if(!ct)return;ct.innerHTML='';
  var lb=$('ptLabel'),bn=$('ptBanner');
  var sp=S.spt,pyms=A.pYMs;

  if(lb){
    if(sp==='all'){
      lb.textContent='全パートナー（合計）';
      if(bn){bn.style.background='var(--pl)';bn.style.borderColor='rgba(30,58,95,.13)'}
    }else{
      lb.textContent='パートナー #'+sp;
      if(bn){bn.style.background='var(--al)';bn.style.borderColor='rgba(16,185,129,.2)'}
    }
  }

  // 月別データ構築（MoM/YoY付き）
  var rows=pyms.map(function(ym){
    if(sp==='all'){
      var pm=A.pMon.find(function(m){return m.ym===ym});
      return{ym:ym,a:pm?pm.a:0,sl:pm?pm.sl:0,cl:pm?pm.cl:0};
    }else{
      var partner=A.pList.find(function(p){return String(p.id)===sp});
      if(!partner)return{ym:ym,a:0,sl:0,cl:0};
      var m=partner.m[ym];
      return{ym:ym,a:m?m.a:0,sl:m?m.sl:0,cl:m?m.cl:0};
    }
  });
  // MoM/YoY計算
  var rowMap={};rows.forEach(function(r){rowMap[r.ym]=r});
  rows.forEach(function(r){
    var prev=rowMap[prevYM(r.ym)];
    var yoy=rowMap[yoyYM(r.ym)];
    r.mom=prev&&prev.a>0?parseFloat(((r.a-prev.a)/prev.a*100).toFixed(1)):null;
    r.yoy=yoy&&yoy.a>0?parseFloat(((r.a-yoy.a)/yoy.a*100).toFixed(1)):null;
  });

  // 月次棒グラフ（MoM折れ線付き）
  var chartDiv=document.createElement('div');chartDiv.style.cssText='width:100%;margin-bottom:12px';
  ct.appendChild(chartDiv);
  requestAnimationFrame(function(){drawMonthlyBar(chartDiv,rows,'ptm',sp==='all'?'#1E3A5F':'#10B981',{momLine:true,hasLines:true,height:260})});

  // MoM/YoY サマリー（直近月の比較だけ表示）
  var rowMap={};rows.forEach(function(r){rowMap[r.ym]=r});
  var lastYM=pyms[pyms.length-1];
  var lastR=rowMap[lastYM];
  var prevR=rowMap[prevYM(lastYM)];
  var yoyR=rowMap[yoyYM(lastYM)];

  var badges=document.createElement('div');
  badges.style.cssText='display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;background:var(--g50);border-radius:8px;font-size:12px';
  var bHTML='<span style="color:var(--g500);font-weight:600">'+lastYM+'</span>';
  bHTML+='<span style="font-weight:700;color:var(--p)">'+fmt(lastR?lastR.a:0)+'</span>';
  if(prevR&&prevR.a>0)bHTML+='<span>MoM: '+diffTag(lastR.a,prevR.a)+'</span>';
  if(yoyR&&yoyR.a>0)bHTML+='<span>YoY: '+diffTag(lastR.a,yoyR.a)+'</span>';
  bHTML+='<span style="color:var(--g400)">'+(lastR?lastR.sl:0)+'件</span>';
  badges.innerHTML=bHTML;
  ct.appendChild(badges);
}

  if(A.prods.length>0)items.push({t:tN(A.prods[0].nm,30)+' が売上1位',b:'構成比'+(A.prods[0].a/A.tA*100).toFixed(1)+'%。SNS広告・インフルエンサーPRの軸商品として有効です。'});
  if(A.monthly.length>=2){var last=A.monthly[A.monthly.length-1],prev=A.monthly[A.monthly.length-2];var mp=calcPct(last.a,prev.a);if(mp!==null)items.push({t:'直近月('+last.ym+')の前月比: '+(mp>=0?'+':'')+mp+'%',b:mp>=0?'成長が継続しています。上位パートナーへの報酬率見直しやイベント連動施策でさらなる拡大が見込めます。':'売上が減少傾向です。新規パートナーの獲得やクーポン施策の強化を検討してください。'})}
  if(A.pList.length>=3){var t3=A.pList.slice(0,3).reduce(function(s,p){return s+p.ta},0);items.push({t:'Top3パートナーで全体の'+(t3/A.tA*100).toFixed(0)+'%',b:'#'+A.pList.slice(0,3).map(function(p){return p.id}).join(', #')+'。個別の報酬交渉やコンテンツ提供で関係強化が有効です。'})}
  items.push({t:'外部露出の拡大案',b:'Instagram Reels / TikTok での商品比較、美容系YouTuberタイアップ、ターゲット層向けメディアへの記事広告が有望です。'});
  items.forEach(function(it){var d=document.createElement('div');d.className='ins';d.innerHTML='<div style="font-weight:700;font-size:13px;color:var(--g900);margin-bottom:3px">'+it.t+'</div><div style="font-size:12px;color:var(--g700);line-height:1.7">'+it.b+'</div>';ins.b.appendChild(d)});
  fg.appendChild(ins.w);
  tc.appendChild(fg);
  requestAnimationFrame(function(){rPL();rPC2();rPM()});
}

function rPL(){var A=S.A;if(!A)return;var ct=$('plC');if(!ct)return;var sp=S.sp,data;if(sp==='all')data=A.daily.map(function(d){return{d:d.d,a:d.a}});else{var m={};A.pDaily.filter(function(d){return d.iid===sp}).forEach(function(d){m[d.d]=(m[d.d]||0)+d.a});data=A.allD.map(function(d){return{d:d,a:m[d]||0}})}var ci=sp!=='all'?A.prods.findIndex(function(p){return p.id===sp}):0;var col=CL[Math.max(0,ci)%CL.length];drawLine(ct,data,A.allD,'pl',col);var sel=$('plSel');if(sel)sel.value=sp;
  var cm=$('plM');if(!cm)return;var mData;if(sp==='all'){mData=A.monthly.map(function(m){return{ym:m.ym,a:m.a}})}else{mData=A.allYM.map(function(ym){return{ym:ym,a:A.pmm[sp+'|'+ym]||0}})}drawMonthlyBar(cm,mData,'plm',col)}

// 商品別売上構成（月フィルタ対応 + MoM/YoY付き）
function rPC2(){
  var A=S.A;if(!A)return;var ct=$('pcC');if(!ct)return;ct.innerHTML='';
  var ym=S.sm;
  var flt=ym==='all'?S.orders:S.orders.filter(function(o){return o.ym===ym});
  var pm2={};flt.forEach(function(o){if(!pm2[o.iid])pm2[o.iid]={id:o.iid,nm:'',a:0,c:0,rw:0};pm2[o.iid].a+=o.a;pm2[o.iid].c++;pm2[o.iid].rw+=o.rw});
  var lb2=bL(flt.length?flt:S.orders);Object.values(pm2).forEach(function(p){p.nm=lb2[p.id]||p.id});
  var prods=Object.values(pm2).sort(function(a,b){return b.a-a.a});
  var tA2=flt.reduce(function(s,o){return s+o.a},0),tO2=flt.length;
  var pL=ym==='all'?A.allYM[0].slice(2)+'〜'+A.allYM[A.allYM.length-1].slice(2):ym;

  // サマリー行
  var sm=document.createElement('div');sm.style.cssText='display:flex;gap:16px;align-items:baseline;margin-bottom:14px;padding:10px 14px;background:var(--g50);border-radius:8px;font-size:12px;flex-wrap:wrap';
  sm.innerHTML='<span style="color:var(--g500)">合計</span><span style="font-weight:800;font-size:18px;color:var(--p)">'+fmt(tA2)+'</span><span style="color:var(--g400)">'+tO2+'件</span><span style="color:var(--g400)">'+prods.length+'商品</span><span style="color:var(--g400)">'+pL+'</span>';
  ct.appendChild(sm);

  // MoM/YoY用: 比較月の計算
  var prevYmStr=ym!=='all'?prevYM(ym):null;
  var yoyYmStr=ym!=='all'?yoyYM(ym):null;
  var prevProd={},yoyProd={};
  if(prevYmStr)S.orders.filter(function(o){return o.ym===prevYmStr}).forEach(function(o){prevProd[o.iid]=(prevProd[o.iid]||0)+o.a});
  if(yoyYmStr)S.orders.filter(function(o){return o.ym===yoyYmStr}).forEach(function(o){yoyProd[o.iid]=(yoyProd[o.iid]||0)+o.a});
  // 全期間の場合は最新月ベースでMoM/YoY
  var lastYM=A.allYM[A.allYM.length-1];
  if(ym==='all'){
    S.orders.filter(function(o){return o.ym===prevYM(lastYM)}).forEach(function(o){prevProd[o.iid]=(prevProd[o.iid]||0)+o.a});
    S.orders.filter(function(o){return o.ym===yoyYM(lastYM)}).forEach(function(o){yoyProd[o.iid]=(yoyProd[o.iid]||0)+o.a});
  }
  var compYM=ym!=='all'?ym:lastYM;
  var curProd={};S.orders.filter(function(o){return o.ym===compYM}).forEach(function(o){curProd[o.iid]=(curProd[o.iid]||0)+o.a});

  prods.forEach(function(p,i){
    var pv=tA2>0?(p.a/tA2)*100:0;
    var sel2=S.sp===p.id;
    // MoM/YoY
    var curA=curProd[p.id]||0;
    var prevA=prevProd[p.id]||null;if(prevA===0)prevA=null;
    var yoyA2=yoyProd[p.id]||null;if(yoyA2===0)yoyA2=null;
    var momH=prevA!=null?diffTag(curA,prevA):'';
    var yoyH=yoyA2!=null?diffTag(curA,yoyA2):'';
    var compLabel=momH||yoyH?'<div style="display:flex;gap:8px;margin-top:2px;font-size:10px">'+(momH?'<span>MoM '+momH+'</span>':'')+(yoyH?'<span>YoY '+yoyH+'</span>':'')+'</div>':'';

    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:flex-start;gap:10px;margin-bottom:4px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .15s;border-left:3px solid '+(sel2?'var(--p)':'transparent');
    if(sel2)row.style.background='var(--pl)';
    row.onmouseenter=function(){if(!sel2)row.style.background='var(--g100)'};
    row.onmouseleave=function(){if(!sel2)row.style.background=sel2?'var(--pl)':''};
    row.onclick=(function(pid){return function(){S.sp=S.sp===pid?'all':pid;rPL();rPC2();rPM();var el=$('plC');if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}})(p.id);
    row.innerHTML='<span style="font-size:11px;color:var(--g400);width:20px;text-align:right;font-weight:700;flex-shrink:0;padding-top:2px">'+(i+1)+'</span>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:3px;gap:8px">'+
          '<span style="font-size:12px;font-weight:'+(sel2?'600':'400')+';color:'+(sel2?'var(--p)':'var(--g700)')+';line-height:1.4">'+tN(p.nm)+'</span>'+
          '<span style="font-size:12px;font-weight:700;color:var(--p);flex-shrink:0">'+fmt(p.a)+'</span>'+
        '</div>'+
        '<div class="pt"><div class="pf" style="width:'+pv+'%;background:'+CL[i%CL.length]+'"></div></div>'+
        '<div style="display:flex;gap:10px;margin-top:2px;font-size:10px;color:var(--g400)">'+
          '<span>'+p.c+'件</span><span>構成比 '+pv.toFixed(1)+'%</span><span>報酬 '+fmt(p.rw)+'</span>'+
        '</div>'+
        compLabel+
      '</div>';
    ct.appendChild(row);
  });
}

// 下段: 選択商品（or全体）の月次推移テーブル
function rPM(){
  var A=S.A;if(!A)return;
  var ct=$('pmC');if(!ct)return;ct.innerHTML='';
  var lb=$('pmLabel');
  var sp=S.sp;
  var allYM=A.allYM;

  // ラベル更新
  if(lb){
    if(sp==='all'){
      lb.textContent='全商品（合計）';
      $('pmBanner').style.background='var(--pl)';
      $('pmBanner').style.borderColor='rgba(30,58,95,.13)';
    }else{
      var prod=A.prods.find(function(p){return p.id===sp});
      lb.textContent=prod?prod.nm:'—';
      $('pmBanner').style.background='var(--al)';
      $('pmBanner').style.borderColor='rgba(16,185,129,.2)';
    }
  }

  // 月別データ構築
  var rows=allYM.map(function(ym){
    var amt,cnt;
    if(sp==='all'){
      var om=A.monthly.find(function(m){return m.ym===ym});
      amt=om?om.a:0;cnt=om?om.sl:0;
    }else{
      amt=A.pmm[sp+'|'+ym]||0;
      cnt=0;S.orders.forEach(function(o){if(o.iid===sp&&o.ym===ym)cnt++});
    }
    return{ym:ym,a:amt,c:cnt};
  });

  // MoM/YoY計算
  var rowMap={};rows.forEach(function(r){rowMap[r.ym]=r});
  rows.forEach(function(r){
    var prev=rowMap[prevYM(r.ym)];
    var yoy=rowMap[yoyYM(r.ym)];
    var yoyA=yoy?yoy.a:null;
    if(yoyA===null&&sp==='all'&&A.blMap[yoyYM(r.ym)])yoyA=A.blMap[yoyYM(r.ym)].a;
    r.mom=prev&&prev.a>0?parseFloat(((r.a-prev.a)/prev.a*100).toFixed(1)):null;
    r.yoy=yoyA&&yoyA>0?parseFloat(((r.a-yoyA)/yoyA*100).toFixed(1)):null;
  });

  // 月次棒グラフ（MoM折れ線付き）
  var chartDiv=document.createElement('div');chartDiv.style.cssText='width:100%;margin-bottom:16px';
  ct.appendChild(chartDiv);
  var ci=sp!=='all'?A.prods.findIndex(function(p){return p.id===sp}):0;
  var color=sp!=='all'?CL[Math.max(0,ci)%CL.length]:'#1E3A5F';
  requestAnimationFrame(function(){drawMonthlyBar(chartDiv,rows,'pm',color,{momLine:true,hasLines:true,height:260})});

  var tbl=document.createElement('table');tbl.className='dt';
  tbl.innerHTML='<thead><tr><th class="al">月</th><th class="ar">売上金額</th><th class="ar">MoM</th><th class="ar">YoY</th><th class="ar">件数</th></tr></thead>';

  var tbody=document.createElement('tbody');
  rows.forEach(function(r){
    var momH=r.mom!==null?diffTag(r.a,rowMap[prevYM(r.ym)].a):'<span style="color:var(--g400)">—</span>';
    var yoyR=rowMap[yoyYM(r.ym)];
    var yoyA2=yoyR?yoyR.a:null;
    if(yoyA2===null&&sp==='all'&&A.blMap[yoyYM(r.ym)])yoyA2=A.blMap[yoyYM(r.ym)].a;
    var yoyH=yoyA2!=null&&yoyA2>0?diffTag(r.a,yoyA2):'<span style="color:var(--g400)">—</span>';
    var isZero=r.a===0&&r.c===0;
    var tr=document.createElement('tr');
    if(isZero)tr.style.opacity='0.4';
    tr.innerHTML='<td class="fb">'+r.ym+'</td><td class="ar fb cp">'+fmt(r.a)+'</td><td class="ar">'+momH+'</td><td class="ar">'+yoyH+'</td><td class="ar">'+r.c+'件</td>';
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);ct.appendChild(tbl);
}

// ═══ Init ═══
var rT;window.addEventListener('resize',function(){clearTimeout(rT);rT=setTimeout(function(){if(S.A)render()},200)});
window.addEventListener('load',function(){setTimeout(function(){try{initGIS()}catch(e){}},500)});
render();
</script>
